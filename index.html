<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品入库系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="number"],
        input[type="datetime-local"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .export-btn {
            background-color: #2196F3;
        }
        .export-btn:hover {
            background-color: #0b7dda;
        }
        .data-section {
            margin-top: 30px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .section-header h2 {
            font-size: 16px;
            color: #333;
        }
        .toggle-btn {
            background-color: transparent;
            color: #333;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }
        .data-content {
            margin-top: 15px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .no-data {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>商品入库系统</h1>
        
        <!-- 入库表单 -->
        <form id="inventoryForm">
            <div class="form-group">
                <label for="inDate">入库时间</label>
                <input type="datetime-local" id="inDate" name="inDate" required>
            </div>
            <div class="form-group">
                <label for="productName">商品名称</label>
                <input type="text" id="productName" name="productName" required>
            </div>
            <div class="form-group">
                <label for="quantity">数量</label>
                <input type="number" id="quantity" name="quantity" min="1" required>
            </div>
            <div class="form-group">
                <label for="spec">规格</label>
                <input type="text" id="spec" name="spec" required>
            </div>
            <button type="submit">入库</button>
        </form>
        
        <!-- 数据展示区域 -->
        <div class="data-section">
            <div class="section-header" onclick="toggleData()">
                <h2>入库记录</h2>
                <button class="toggle-btn" id="toggleBtn">▼</button>
            </div>
            <div class="data-content" id="dataContent">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>入库时间</th>
                            <th>商品名称</th>
                            <th>数量</th>
                            <th>规格</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="no-data">
                            <td colspan="3">暂无入库记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 导出按钮 -->
        <div style="margin-top: 20px; text-align: right;">
            <button class="export-btn" onclick="exportData('table')">导出表格</button>
            <button class="export-btn" onclick="exportData('text')">导出文本</button>
        </div>
    </div>
    
    <script>
        // 初始化日期时间为当前时间
        function initDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const datetimeString = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById('inDate').value = datetimeString;
        }
        
        // 初始化
        window.onload = function() {
            initDateTime();
            loadData();
        };
        
        // 存储数据到本地存储
        function saveData(data) {
            localStorage.setItem('inventoryData', JSON.stringify(data));
        }
        
        // 从本地存储加载数据
        function loadData() {
            const data = JSON.parse(localStorage.getItem('inventoryData') || '[]');
            renderTable(data);
        }
        
        // 渲染表格
        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr class="no-data"><td colspan="4">暂无入库记录</td></tr>';
                return;
            }
            
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.date}</td>
                    <td>${item.name}</td>
                    <td>${item.quantity}</td>
                    <td>${item.spec}</td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        // 表单提交处理
        document.getElementById('inventoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('inDate').value;
            const name = document.getElementById('productName').value;
            const quantity = document.getElementById('quantity').value;
            const spec = document.getElementById('spec').value;
            
            const data = JSON.parse(localStorage.getItem('inventoryData') || '[]');
            data.push({ date, name, quantity, spec });
            saveData(data);
            renderTable(data);
            
            // 重置表单
            this.reset();
            initDateTime();
        });
        
        // 切换数据区域显示/隐藏
        function toggleData() {
            const content = document.getElementById('dataContent');
            const btn = document.getElementById('toggleBtn');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                btn.textContent = '▼';
            } else {
                content.style.display = 'none';
                btn.textContent = '▶';
            }
        }
        
        // 导出数据
        function exportData(type) {
            const data = JSON.parse(localStorage.getItem('inventoryData') || '[]');
            
            if (data.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            
            if (type === 'table') {
                // 导出为 CSV 格式
                let csvContent = '入库时间，商品名称，数量，规格\n';
                data.forEach(item => {
                    csvContent += `${item.date},${item.name},${item.quantity},${item.spec}\n`;
                });
                
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `入库记录_${new Date().toISOString().slice(0,10)}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else if (type === 'text') {
                // 导出为文本格式
                let textContent = '商品入库记录\n';
                textContent += '====================\n';
                data.forEach((item, index) => {
                    textContent += `记录 ${index + 1}:\n`;
                    textContent += `  入库时间：${item.date}\n`;
                    textContent += `  商品名称：${item.name}\n`;
                    textContent += `  数量：${item.quantity}\n`;
                    textContent += `  规格：${item.spec}\n`;
                    textContent += '---------------------\n';
                });
                
                const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `入库记录_${new Date().toISOString().slice(0,10)}.txt`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
